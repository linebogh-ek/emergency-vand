<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/fonts.css">
</head>

<body>


    <form>
        <h2 class="form-group">Indberet</h2>
        <div class="form-group">
            <label for="email"> Email adresse </label>
            <input type="email" id="email" name="email">
        </div>
        <fieldset class="form-group">
            <legend>
                <p>Må vi kontakte dig, hvis vi har brug for mere information?</p>
            </legend>
            <label for="radio_ja">
                <input type="radio" id="radio_ja" name="kontakt" value="Ja">
                Ja
            </label>

            <label for="radio_nej">
                <input type="radio" id="radio_nej" name="kontakt" value="Nej">
                Nej
            </label>
        </fieldset>
        <div class="form-group">
            <label for="indberet">Hvad indberetter du?</label>
            <textarea id="indberet" name="indberet" cols="40"
                rows="8"> Beskriv i så mange detaljer som muligt</textarea>

        </div>
        <div class="form-group">
            <p>Beskriv tid og sted</p>
            <label for="tid">Tid</label>
            <input type="datetime-local" id="tid" name="tid">
            <label for="sted">Sted</label>
            <input type="text" id="sted" name="sted">
        </div>
        <div class="form-group">
            <label for="bemærkninger"> Andre bemærkninger? </label>
            <textarea name="bemærkninger" id="bemærkninger" cols="40" rows="8"></textarea>
        </div>
        <input class="form-knap" class="form-group" type="button" value="Indberet">
    </form>


</body>

</html>
